apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "streamingapp.fullname" . }}-chat
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat
spec:
  replicas: {{ .Values.chat.replicaCount }}
  selector:
    matchLabels:
      {{- include "streamingapp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: chat
  template:
    metadata:
      labels:
        {{- include "streamingapp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: chat
    spec:
      serviceAccountName: {{ include "streamingapp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: chat
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: {{ include "streamingapp.image" (dict "Values" .Values "repository" .Values.chat.image.repository "tag" (.Values.chat.image.tag | default .Values.imageTag)) }}
        imagePullPolicy: {{ include "streamingapp.imagePullPolicy" . }}
        ports:
        - name: http
          containerPort: {{ .Values.chat.service.targetPort }}
          protocol: TCP
        env:
        - name: PORT
          value: {{ .Values.chat.env.PORT | quote }}
        - name: NODE_ENV
          value: {{ .Values.chat.env.NODE_ENV | quote }}
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: {{ include "streamingapp.fullname" . }}-config
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "streamingapp.fullname" . }}-secrets
              key: JWT_SECRET
        - name: CLIENT_URLS
          valueFrom:
            configMapKeyRef:
              name: {{ include "streamingapp.fullname" . }}-config
              key: CLIENT_URLS
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          {{- toYaml .Values.chat.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "streamingapp.fullname" . }}-chat
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: chat
spec:
  type: {{ .Values.chat.service.type }}
  ports:
  - port: {{ .Values.chat.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "streamingapp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: chat
