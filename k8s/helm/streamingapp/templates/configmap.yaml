apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "streamingapp.fullname" . }}-config
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
data:
  MONGO_URI: "mongodb://{{ include "streamingapp.fullname" . }}-mongodb:27017/{{ ((.Values.mongodb.env | default dict).MONGO_DB | default "streamingapp") }}"
  AWS_REGION: {{ .Values.global.awsRegion | quote }}
  CLIENT_URLS: {{ .Values.global.clientUrls | quote }}
  STREAMING_PUBLIC_URL: {{ .Values.global.streamingPublicUrl | quote }}
