apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "streamingapp.fullname" . }}-streaming
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: streaming
spec:
  replicas: {{ .Values.streaming.replicaCount }}
  selector:
    matchLabels:
      {{- include "streamingapp.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: streaming
  template:
    metadata:
      labels:
        {{- include "streamingapp.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: streaming
    spec:
      serviceAccountName: {{ include "streamingapp.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: streaming
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: {{ include "streamingapp.image" (dict "Values" .Values "repository" .Values.streaming.image.repository "tag" (.Values.streaming.image.tag | default .Values.imageTag)) }}
        imagePullPolicy: {{ include "streamingapp.imagePullPolicy" . }}
        ports:
        - name: http
          containerPort: {{ .Values.streaming.service.targetPort }}
          protocol: TCP
        env:
        - name: PORT
          value: {{ .Values.streaming.env.PORT | quote }}
        - name: NODE_ENV
          value: {{ .Values.streaming.env.NODE_ENV | quote }}
        - name: MONGO_URI
          valueFrom:
            configMapKeyRef:
              name: {{ include "streamingapp.fullname" . }}-config
              key: MONGO_URI
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: {{ include "streamingapp.fullname" . }}-secrets
              key: JWT_SECRET
        - name: CLIENT_URLS
          valueFrom:
            configMapKeyRef:
              name: {{ include "streamingapp.fullname" . }}-config
              key: CLIENT_URLS
        - name: AWS_REGION
          valueFrom:
            configMapKeyRef:
              name: {{ include "streamingapp.fullname" . }}-config
              key: AWS_REGION
        - name: STREAMING_PUBLIC_URL
          valueFrom:
            configMapKeyRef:
              name: {{ include "streamingapp.fullname" . }}-config
              key: STREAMING_PUBLIC_URL
        {{- if .Values.secrets.awsAccessKeyId }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "streamingapp.fullname" . }}-secrets
              key: AWS_ACCESS_KEY_ID
        {{- end }}
        {{- if .Values.secrets.awsSecretAccessKey }}
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "streamingapp.fullname" . }}-secrets
              key: AWS_SECRET_ACCESS_KEY
        {{- end }}
        {{- if .Values.secrets.awsS3Bucket }}
        - name: AWS_S3_BUCKET
          valueFrom:
            secretKeyRef:
              name: {{ include "streamingapp.fullname" . }}-secrets
              key: AWS_S3_BUCKET
        {{- end }}
        {{- if .Values.secrets.awsCdnUrl }}
        - name: AWS_CDN_URL
          valueFrom:
            secretKeyRef:
              name: {{ include "streamingapp.fullname" . }}-secrets
              key: AWS_CDN_URL
        {{- end }}
        livenessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /api/health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 5
        resources:
          {{- toYaml .Values.streaming.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "streamingapp.fullname" . }}-streaming
  labels:
    {{- include "streamingapp.labels" . | nindent 4 }}
    app.kubernetes.io/component: streaming
spec:
  type: {{ .Values.streaming.service.type }}
  ports:
  - port: {{ .Values.streaming.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    {{- include "streamingapp.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: streaming
